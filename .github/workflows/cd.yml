name: CD - Deploy to Multi-Cloud

on:
  push:
    branches:
      - main

jobs:
  # 部署基礎設施 (Terraform)
  deploy-infrastructure:
    name: Terraform Apply (Infrastructure)
    runs-on: ubuntu-latest
    env:
        # AWS 金鑰(GitHub Secrets)
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        
        # 專案變數(GitHub variables)
        TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
        TF_VAR_gcp_region: ${{ vars.GCP_REGION }}
        TF_VAR_aws_region: ${{ vars.AWS_REGION }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Terraform Init and Apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve
          
  # 部署微服務應用程式
  deploy-services:
    name: Build & Deploy Microservices
    needs: deploy-infrastructure  # 待 Terraform 執行完畢
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Build & Push Images Placeholder
        run: |
          echo "模擬動作：成功推送到雲端的 Image Registry"
          
      - name: Deploy Application Placeholder
        run: |
          echo "全端微服務應用程式上線"