---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-creator-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "delete", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-creator-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: aws-ecr-sa
  namespace: default
roleRef:
  kind: Role
  name: secret-creator-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ecr-credential-job
  namespace: default
spec:
  template:
    spec:
      serviceAccountName: aws-ecr-sa
      restartPolicy: Never
      containers:
      - name: aws-cli
        image: amazon/aws-cli:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "1. Install kubectl"
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && mv kubectl /usr/local/bin/

          echo "2. Get GCP OIDC Token"
          curl -s -H "Metadata-Flavor: Google" "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/identity?audience=sts.amazonaws.com" -o /tmp/web_identity_token

          echo "3. Setup AWS Environment Variables"
          export AWS_ROLE_ARN="arn:aws:iam::576212613996:role/gke-ecr-pull-role"
          export AWS_DEFAULT_REGION="ap-northeast-1"
          export AWS_WEB_IDENTITY_TOKEN_FILE="/tmp/web_identity_token"

          echo "4. Get ECR Login Password"
          ECR_PASSWORD=$(aws ecr get-login-password --region $AWS_DEFAULT_REGION)

          if [ -z "$ECR_PASSWORD" ]; then
            echo "Error: Failed to get AWS password"
            exit 1
          fi

          echo "5. Create K8s Secret"
          ECR_REGISTRY="576212613996.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"

          kubectl delete secret aws-ecr-cred --ignore-not-found
          kubectl create secret docker-registry aws-ecr-cred \
            --docker-server=$ECR_REGISTRY \
            --docker-username=AWS \
            --docker-password=$ECR_PASSWORD

          echo "Success: ECR credential created"