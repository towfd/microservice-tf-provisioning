version: 0.2

phases:
  install:
    commands:
      # 下載到 /tmp 暫存區並解壓縮，避免跟 terraform 資料夾撞名
      - echo "Installing Terraform..."
      - curl -s -qL -o /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
      - unzip -o /tmp/terraform.zip -d /tmp/
      - sudo mv /tmp/terraform /usr/local/bin/
      - terraform --version

  pre_build:
    commands:
      # 切換到 AWS 的 Terraform 資料夾並初始化
      - echo "Entering AWS terraform directory..."
      - cd terraform/aws
      - echo "Initializing Terraform..."
      - terraform init

  build:
    commands:
      # 自動確認並建立資源
      - echo "Applying Terraform configurations..."
      - terraform apply -auto-approve

  post_build:
    commands:
      # 完成
      - echo "AWS Infrastructure deployment completed successfully! 🎉"